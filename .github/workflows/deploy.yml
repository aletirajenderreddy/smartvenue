name: SmartVenueX Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install app deps
        run: npm ci
      - name: Deploy readiness check
        run: npm run deploy-check
      - name: Build app
        run: npm run build
      - name: Install functions deps
        run: cd functions && npm ci
      - name: Functions lint & unit tests
        run: cd functions && npm run lint && npm test
      - name: Deploy hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
          channelId: live
      - name: Deploy rules and indexes
        run: npx firebase-tools deploy --only firestore:rules,firestore:indexes,storage,database --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}
      - name: Deploy functions
        run: npx firebase-tools deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}
